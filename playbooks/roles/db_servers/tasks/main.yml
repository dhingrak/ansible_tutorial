- name: install mariadb package (CentOS)
  tags: centos, db, mariadb
  dnf:
    name: mariadb
    state: latest

  when: ansible_facts["distribution"] == "CentOS"

- name: install mariadb package (Ubuntu)
  tags: ubuntu, db, mariadb
  apt:
    name: mariadb-server
    state: latest
  when: ansible_facts["distribution"] == "Ubuntu"
