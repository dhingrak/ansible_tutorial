---
- hosts: all
  become: true
  pre_tasks:
    - name: install updates (CentOS)
      tags: always
      dnf:
        update_only: yes
        update_cache: yes
      when: ansible_facts["distribution"] == "CentOS"

    - name: install updates (Ubuntu)
      tags: always
      apt:
        upgrade: dist
        update_cache: yes
      when: ansible_facts["distribution"] == "Ubuntu"

- hosts: all
  become: true
  tasks:
    - name: craete simone user
      tags: always
      user:
        name: simone
        groups: root

    - name: add ssh key for simone
      tags: always
      authorized_key:
        user: simone
        key: ""

    - name: add sudoers file for simone
      tags: always
      copy:
        src: ../files/sudoers_simone
        dest: /etc/sudoers.d/simone
        owner: root
        group: root
        mode: 0440
